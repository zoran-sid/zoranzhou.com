name: Import routes

on:
  workflow_dispatch:
  push:
    paths:
      - "public/routes/**/*.gpx"

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run import:routes -- --no-geocode
      - run: npm run validate:routes
      - name: Commit Route Markdown changes
        shell: bash
        run: |
          git add -- src/content/routes
          if git diff --cached --quiet; then
            echo "No Route Markdown changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "content(routes): import changed GPX files"
          git push
