{{ define "main" }}
<div class="ai-chat-container">
    <!-- 设置面板 -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-box">
            <h2>🤖 AI 助手</h2>
            <p>选择一个 AI 模型开始对话</p>
            
            <div class="model-selector">
                <label>选择模型：</label>
                <select id="model-select" onchange="onModelChange()">
                    <optgroup label="OpenAI">
                        <option value="openai:gpt-5.2">GPT-5.2</option>
                        <option value="openai:gpt-5.2-mini">gpt-5.2 Mini</option>
                        <option value="openai:gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="openai:gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    </optgroup>
                    <optgroup label="Anthropic">
                        <option value="anthropic:claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                        <option value="anthropic:claude-3-opus-20240229">Claude 3 Opus</option>
                    </optgroup>
                    <optgroup label="Google">
                        <option value="google:gemini-1.5-pro">Gemini 1.5 Pro</option>
                        <option value="google:gemini-1.5-flash">Gemini 1.5 Flash</option>
                    </optgroup>
                    <optgroup label="DeepSeek">
                        <option value="deepseek:deepseek-chat">DeepSeek V3</option>
                        <option value="deepseek:deepseek-reasoner">DeepSeek R1</option>
                    </optgroup>
                    <optgroup label="Moonshot">
                        <option value="moonshot:kimi-k2.5">Kimi K2.5</option>
                    </optgroup>
                </select>
            </div>

            <div class="api-key-section">
                <label>API Key：</label>
                <div class="api-key-input-wrapper">
                    <input type="password" id="api-key-input" placeholder="输入 API Key">
                    <button onclick="toggleApiKeyVisibility()" class="toggle-btn">👁</button>
                </div>
                <p class="hint">测试版 - API Key 仅存储在本地浏览器中</p>
            </div>

            <button onclick="startChat()" class="start-btn">开始对话</button>
            
            <div class="api-links">
                <small>
                    <a href="https://platform.openai.com/api-keys" target="_blank">OpenAI</a> |
                    <a href="https://console.anthropic.com/settings/keys" target="_blank">Claude</a> |
                    <a href="https://aistudio.google.com/app/apikey" target="_blank">Gemini</a> |
                    <a href="https://platform.deepseek.com/api_keys" target="_blank">DeepSeek</a> |
                    <a href="https://platform.moonshot.cn/console/api-keys" target="_blank">Kimi</a>
                </small>
            </div>
        </div>
    </div>

    <!-- 对话界面 -->
    <div id="chat-panel" class="chat-panel" style="display: none;">
        <!-- 顶部工具栏 -->
        <div class="chat-toolbar">
            <div class="current-model">
                <span id="current-model-name">gpt-5.2</span>
                <button onclick="showSettings()" class="switch-btn">切换</button>
            </div>
            <div class="toolbar-actions">
                <button onclick="clearHistory()" title="清空对话">🗑</button>
            </div>
        </div>

        <!-- 消息历史 -->
        <div id="chat-messages" class="chat-messages">
            <div class="welcome-message">
                <h3>👋 你好！</h3>
                <p>我是多模型 AI 助手，当前使用的是 <span id="welcome-model">gpt-5.2</span>。</p>
                <p>有什么可以帮助你的吗？</p>
            </div>
        </div>
        
        <!-- 输入区域 -->
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <textarea id="message-input" placeholder="输入消息... (Shift+Enter 换行)" rows="1" oninput="autoResize(this)" onkeypress="handleKeyPress(event)"></textarea>
                <button id="send-btn" onclick="sendMessage()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="input-footer">
                <span>AI 回复可能不准确，请核实重要信息</span>
            </div>
        </div>
    </div>
</div>

<script>
// 配置
const CONFIG = {
    STORAGE_KEY: 'ai_chat_config',
    HISTORY_KEY: 'ai_chat_history',
    MAX_HISTORY: 50
};

let currentConfig = {
    provider: 'openai',
    model: 'gpt-5.2',
    apiKey: ''
};

let messages = [];
let isProcessing = false;

// 提供商配置
const PROVIDERS = {
    openai: {
        name: 'OpenAI',
        baseUrl: 'https://api.openai.com/v1/chat/completions',
        authHeader: 'Authorization',
        authPrefix: 'Bearer '
    },
    anthropic: {
        name: 'Anthropic',
        baseUrl: 'https://api.anthropic.com/v1/messages',
        authHeader: 'x-api-key',
        authPrefix: ''
    },
    google: {
        name: 'Google',
        baseUrl: 'https://generativelanguage.googleapis.com/v1beta/models',
        authHeader: 'key',
        authPrefix: ''
    },
    deepseek: {
        name: 'DeepSeek',
        baseUrl: 'https://api.deepseek.com/chat/completions',
        authHeader: 'Authorization',
        authPrefix: 'Bearer '
    },
    moonshot: {
        name: 'Moonshot',
        baseUrl: 'https://api.moonshot.cn/v1/chat/completions',
        authHeader: 'Authorization',
        authPrefix: 'Bearer '
    }
};

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    loadConfig();
    if (currentConfig.apiKey) {
        showChatPanel();
    }
});

// 加载配置
function loadConfig() {
    const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
    if (saved) {
        currentConfig = { ...currentConfig, ...JSON.parse(saved) };
        document.getElementById('api-key-input').value = currentConfig.apiKey || '';
        
        const modelValue = `${currentConfig.provider}:${currentConfig.model}`;
        const select = document.getElementById('model-select');
        for (let option of select.options) {
            if (option.value === modelValue) {
                select.value = modelValue;
                break;
            }
        }
    }
    loadHistory();
}

// 保存配置
function saveConfig() {
    localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(currentConfig));
}

// 切换模型
function onModelChange() {
    const value = document.getElementById('model-select').value;
    const [provider, model] = value.split(':');
    currentConfig.provider = provider;
    currentConfig.model = model;
}

// 显示/隐藏 API Key
function toggleApiKeyVisibility() {
    const input = document.getElementById('api-key-input');
    input.type = input.type === 'password' ? 'text' : 'password';
}

// 开始对话
function startChat() {
    const apiKey = document.getElementById('api-key-input').value.trim();
    if (!apiKey) {
        alert('请输入 API Key');
        return;
    }
    
    onModelChange();
    currentConfig.apiKey = apiKey;
    saveConfig();
    showChatPanel();
}

// 显示对话面板
function showChatPanel() {
    document.getElementById('settings-panel').style.display = 'none';
    document.getElementById('chat-panel').style.display = 'flex';
    
    document.getElementById('current-model-name').textContent = currentConfig.model;
    document.getElementById('welcome-model').textContent = currentConfig.model;
    
    renderHistory();
    document.getElementById('message-input').focus();
}

// 显示设置
function showSettings() {
    document.getElementById('chat-panel').style.display = 'none';
    document.getElementById('settings-panel').style.display = 'flex';
}

// 自动调整输入框
function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
    document.getElementById('send-btn').disabled = !textarea.value.trim();
}

// 处理键盘
function handleKeyPress(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

// 发送消息
async function sendMessage() {
    if (isProcessing) return;
    
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text) return;
    
    addMessage('user', text);
    messages.push({ role: 'user', content: text });
    saveHistory();
    
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    
    isProcessing = true;
    const loadingId = addLoading();
    
    try {
        const reply = await callProviderAPI(text);
        removeLoading(loadingId);
        addMessage('ai', reply);
        messages.push({ role: 'assistant', content: reply });
        saveHistory();
    } catch (error) {
        removeLoading(loadingId);
        addMessage('ai', '错误：' + error.message, true);
    } finally {
        isProcessing = false;
    }
}

// 调用 API
async function callProviderAPI(message) {
    const provider = PROVIDERS[currentConfig.provider];
    
    switch (currentConfig.provider) {
        case 'openai':
        case 'deepseek':
        case 'moonshot':
            return await callOpenAICompatible(provider, message);
        case 'anthropic':
            return await callAnthropic(provider, message);
        case 'google':
            return await callGemini(provider, message);
        default:
            throw new Error('未知的提供商');
    }
}

// OpenAI 兼容格式
async function callOpenAICompatible(provider, message) {
    const response = await fetch(provider.baseUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            [provider.authHeader]: provider.authPrefix + currentConfig.apiKey
        },
        body: JSON.stringify({
            model: currentConfig.model,
            messages: [{ role: 'system', content: 'You are a helpful assistant.' },
                      ...messages.slice(-10)],
            temperature: 0.7,
            max_tokens: 4096
        })
    });
    
    if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error?.message || `HTTP ${response.status}`);
    }
    
    const data = await response.json();
    return data.choices[0].message.content;
}

// Anthropic Claude
async function callAnthropic(provider, message) {
    const response = await fetch(provider.baseUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            [provider.authHeader]: provider.authPrefix + currentConfig.apiKey,
            'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
            model: currentConfig.model,
            max_tokens: 4096,
            messages: messages.slice(-10).map(m => ({
                role: m.role === 'assistant' ? 'assistant' : 'user',
                content: m.content
            }))
        })
    });
    
    if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error?.message || `HTTP ${response.status}`);
    }
    
    const data = await response.json();
    return data.content[0].text;
}

// Google Gemini
async function callGemini(provider, message) {
    const url = `${provider.baseUrl}/${currentConfig.model}:generateContent?key=${currentConfig.apiKey}`;
    
    const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            contents: messages.slice(-10).map(m => ({
                role: m.role === 'assistant' ? 'model' : 'user',
                parts: [{ text: m.content }]
            }))
        })
    });
    
    if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error?.message || `HTTP ${response.status}`);
    }
    
    const data = await response.json();
    return data.candidates[0].content.parts[0].text;
}

// 添加消息
function addMessage(role, text, isError = false) {
    const container = document.getElementById('chat-messages');
    const welcome = container.querySelector('.welcome-message');
    if (welcome) welcome.remove();
    
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}-message ${isError ? 'error' : ''}`;
    
    const avatar = role === 'ai' ? '🤖' : '👤';
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    
    let formattedText = escapeHtml(text)
        .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    
    msgDiv.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div class="message-content">
            <div class="message-text">${formattedText}</div>
            <div class="message-time">${time}</div>
        </div>
    `;
    
    container.appendChild(msgDiv);
    scrollToBottom();
}

function addLoading() {
    const container = document.getElementById('chat-messages');
    const id = 'loading-' + Date.now();
    const div = document.createElement('div');
    div.id = id;
    div.className = 'message ai-message loading';
    div.innerHTML = `
        <div class="message-avatar">🤖</div>
        <div class="message-content">
            <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
    `;
    container.appendChild(div);
    scrollToBottom();
    return id;
}

function removeLoading(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

function scrollToBottom() {
    const container = document.getElementById('chat-messages');
    container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function saveHistory() {
    localStorage.setItem(CONFIG.HISTORY_KEY, JSON.stringify(messages.slice(-CONFIG.MAX_HISTORY)));
}

function loadHistory() {
    const saved = localStorage.getItem(CONFIG.HISTORY_KEY);
    if (saved) {
        messages = JSON.parse(saved);
    }
}

function renderHistory() {
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';
    
    if (messages.length === 0) {
        container.innerHTML = `
            <div class="welcome-message">
                <h3>👋 你好！</h3>
                <p>我是多模型 AI 助手，当前使用的是 <span id="welcome-model">${currentConfig.model}</span>。</p>
                <p>有什么可以帮助你的吗？</p>
            </div>
        `;
        return;
    }
    
    messages.forEach(m => addMessage(m.role === 'assistant' ? 'ai' : 'user', m.content));
}

function clearHistory() {
    if (confirm('确定要清空对话历史吗？')) {
        messages = [];
        saveHistory();
        renderHistory();
    }
}
</script>
