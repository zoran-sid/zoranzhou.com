<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZORAN ZHOU</title>
<script>
  (function() {
    var lang = (document.cookie.match(/(?:^|;\s*)pref-lang=([^;]*)/)||[])[1];
    if (!lang) {
      var browserLang = (navigator.language || navigator.languages[0] || '').slice(0,2);
      lang = browserLang === 'en' ? 'en' : 'zh-CN';
    }
    window.location.replace('/' + lang + '/');
  })();
</script>
</head>
<body></body>
</html>
